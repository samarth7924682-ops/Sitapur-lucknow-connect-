<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }

        .success-container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        /* Success Icon Animation */
        .icon-wrapper {
            position: relative;
            margin-bottom: 30px;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background-color: #e7fcf0;
            color: #00b67a;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto;
            border: 4px solid #fff;
            box-shadow: 0 10px 20px rgba(0, 182, 122, 0.2);
        }

        h1 {
            color: #1a1f36;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        p {
            color: #697386;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .btn {
            background-color: #0060df;
            color: white;
            padding: 16px 40px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(0, 96, 223, 0.3);
            display: inline-block;
        }
        .redirect-text {
            font-size: 12px;
            color: #aaa;
            margin-top: 20px;
        }
        .progress-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 99px;
            margin-top: 10px;
            overflow: hidden;
            max-width: 400px;
            width: 90%;
            margin-left: auto;
            margin-right: auto;
        }
        .progress-fill {
            height: 100%;
            background: #00b67a;
            border-radius: 99px;
            animation: fill 2s linear forwards;
        }
        @keyframes fill {
            from { width: 0%; }
            to { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="success-container">
        <div class="icon-wrapper">
            <div class="success-icon">✓</div>
        </div>
        <h1>Payment Successful</h1>
        <p>Your order has been confirmed successfully.</p>
        <a href="https://www.lkostpcouriers.in/index.html" class="btn">Back to Home</a>
        <p class="redirect-text">2 second mein automatically redirect ho raha hai...</p>
    </div>
    <div class="progress-bar"><div class="progress-fill"></div></div>

    <script>
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#0060df', '#00b67a']
        });
        setTimeout(() => {
            window.location.replace("https://www.lkostpcouriers.in/index.html");
        }, 2000);
    </script>
</body>
</html>
