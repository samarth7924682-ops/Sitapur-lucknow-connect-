<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitapur Express | Verification</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <style>
        :root { 
            --primary: #0c1c3a; 
            --gold: #ffc107; 
            --bg: #0c1c3a; 
            --white: #ffffff; 
            --text-muted: #64748b;
            --success: #22c55e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: var(--bg);
            background: linear-gradient(rgba(12, 28, 58, 0.95), rgba(12, 28, 58, 0.95)), url('https://images.unsplash.com/photo-1474487548417-781cb71495f3?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; height: 100vh; padding: 20px;
        }
        
        .auth-card {
            background: var(--white); width: 100%; max-width: 360px;
            padding: 35px 25px; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
        }
        .auth-card h2 { font-size: 22px; font-weight: 800; color: var(--primary); margin-bottom: 6px; }
        .auth-card p { font-size: 12px; color: var(--text-muted); margin-bottom: 25px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 10px; font-weight: 800; color: var(--primary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 15px; font-weight: 600; outline: none; transition: 0.2s; color: var(--primary); }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(12,28,58,0.05); }
        
        .auth-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 14px; font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 15px rgba(12,28,58,0.2); }
        .auth-btn:active { transform: scale(0.98); }
        .auth-btn:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; }

        .resend-box { margin-top: 15px; font-size: 12px; font-weight: 600; color: var(--text-muted); }
        .resend-link { color: #4f46e5; text-decoration: none; font-weight: 800; cursor: pointer; display: inline-block; }
        .resend-link.disabled { color: #cbd5e1; cursor: not-allowed; pointer-events: none; }

        .toast-notification {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 12px 24px;
            border-radius: 50px; font-size: 12px; font-weight: 700; z-index: 10000;
            display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .toast-notification.show { top: 25px; }
        .toast-notification i { color: var(--gold); font-size: 14px; }
        
        #captchaSection {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-height: 78px;
        }
        #recaptcha-container {
            display: inline-block;
        }
        
        .fade-in {
            animation: fadeIn 0.4s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="toastNotification" class="toast-notification">
        <i class="fas fa-info-circle"></i> <span id="toastMessage">Notification</span>
    </div>

    <div class="auth-card">
        <div style="font-size: 38px; color: var(--gold); margin-bottom: 12px;"><i class="fas fa-train"></i></div>
        <h2>Sitapur Express</h2>
        <p>Secure Client Verification Portal</p>

        <div id="captchaSection">
            <span style="font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px;">Security Verification</span>
            <div id="recaptcha-container"></div>
        </div>

        <div id="phoneSection" style="display: none;">
            <div class="input-group">
                <label>Mobile Number</label>
                <input type="tel" id="phoneNumber" placeholder="Enter 10-digit Number" autocomplete="tel">
            </div>
            <button class="auth-btn" id="sendOtpBtn">SEND SECURITY OTP</button>
        </div>

        <div id="otpSection" style="display: none;">
            <div class="input-group">
                <label>Enter 6-Digit OTP</label>
                <input type="input" id="otpCode" inputmode="numeric" pattern="[0-9]*" placeholder="ENTER OTP" maxlength="6" style="text-align: center; font-size: 18px; letter-spacing: 4px;">
            </div>
            <button class="auth-btn" id="verifyOtpBtn" style="background: var(--success); box-shadow: 0 6px 15px rgba(34,197,94,0.2);">VERIFY & ENTER APP</button>
            
            <div class="resend-box">
                Didn't get the OTP? <span id="resendBtn" class="resend-link disabled" onclick="triggerResend()">Resend OTP</span> <span id="timerText">(30s)</span>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC2r-fGV1DycoIdxlVWad46ovdI8GWN3n4",
            authDomain: "sitapur-express.firebaseapp.com",
            databaseURL: "https://sitapur-express-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sitapur-express"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();

        let confirmationResult = null;
        let countdownTimer = null;
        let rawPhoneNumber = "";

        auth.onAuthStateChanged((user) => {
            if (user) { window.location.href = "index.html"; }
        });

        function showNotification(message, icon = "fa-info-circle") {
            const toast = document.getElementById('toastNotification');
            const msgSpan = document.getElementById('toastMessage');
            toast.querySelector('i').className = `fas ${icon}`;
            msgSpan.innerText = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3500);
        }

        // Standard instant boot init loop
        function initRecaptcha() {
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                'size': 'normal',
                'callback': (response) => {
                    showNotification("Security verified! Enter mobile number.", "fa-check-circle");
                    const phoneSec = document.getElementById('phoneSection');
                    phoneSec.style.display = 'block';
                    phoneSec.classList.add('fade-in');
                    document.getElementById('captchaSection').style.opacity = "0.5";
                    document.getElementById('phoneNumber').focus();
                },
                'expired-callback': () => {
                    showNotification("Captcha expired. Please verify again.", "fa-exclamation-triangle");
                    resetRecaptchaInstance();
                }
            });
            window.recaptchaVerifier.render();
        }

        function resetRecaptchaInstance() {
            document.getElementById('phoneSection').style.display = 'none';
            if (window.grecaptcha && window.recaptchaVerifier) {
                window.recaptchaVerifier.render().then(widgetId => {
                    grecaptcha.reset(widgetId);
                });
            }
        }

        window.onload = () => {
            initRecaptcha();
        };

        document.getElementById('sendOtpBtn').addEventListener('click', () => {
            let phoneInput = document.getElementById('phoneNumber').value.trim();
            const sendBtn = document.getElementById('sendOtpBtn');
            
            if(!phoneInput || phoneInput.length < 10) {
                showNotification("Please enter a valid mobile number", "fa-exclamation-triangle");
                return;
            }

            // Cleanup padding numbers safely
            if(!phoneInput.startsWith('+')) {
                if(phoneInput.startsWith('91') && phoneInput.length > 10) {
                    phoneInput = "+" + phoneInput;
                } else {
                    phoneInput = "+91" + phoneInput;
                }
            }

            rawPhoneNumber = phoneInput;
            sendBtn.disabled = true;
            showNotification("Sending secure OTP...", "fa-circle-notch fa-spin");

            auth.signInWithPhoneNumber(phoneInput, window.recaptchaVerifier)
                .then((result) => {
                    confirmationResult = result;
                    showNotification("6-Digit OTP Sent Successfully!", "fa-check-circle");
                    
                    document.getElementById('captchaSection').style.display = 'none';
                    document.getElementById('phoneSection').style.display = 'none';
                    document.getElementById('otpSection').style.display = 'block';
                    document.getElementById('otpCode').focus();
                    
                    startResendTimer();
                })
                .catch((error) => {
                    console.error(error);
                    sendBtn.disabled = false;
                    showNotification("Token Error! Resetting secure bridge...", "fa-sync-alt");
                    resetRecaptchaInstance();
                });
        });

        document.getElementById('otpCode').addEventListener('input', (e) => {
            const currentVal = e.target.value.trim();
            if(currentVal.length === 6 && !isNaN(currentVal)) {
                processOtpVerification(currentVal);
            }
        });

        document.getElementById('verifyOtpBtn').addEventListener('click', () => {
            const code = document.getElementById('otpCode').value.trim();
            if (code.length !== 6 || isNaN(code)) {
                showNotification("Please enter complete 6-Digit OTP", "fa-exclamation-triangle");
                return;
            }
            processOtpVerification(code);
        });

        function processOtpVerification(code) {
            const verifyBtn = document.getElementById('verifyOtpBtn');
            verifyBtn.disabled = true;
            showNotification("Verifying with server...", "fa-circle-notch fa-spin");

            confirmationResult.confirm(code)
                .then((result) => {
                    showNotification("Access Granted! Opening Dashboard...", "fa-check-circle");
                    setTimeout(() => { window.location.href = "index.html"; }, 1000);
                })
                .catch((error) => {
                    console.error(error);
                    verifyBtn.disabled = false;
                    showNotification("Invalid OTP! Try again.", "fa-times-circle");
                    document.getElementById('otpCode').value = "";
                });
        }

        function startResendTimer() {
            let timeLeft = 30;
            const resendBtn = document.getElementById('resendBtn');
            const timerText = document.getElementById('timerText');

            resendBtn.classList.add('disabled');
            clearInterval(countdownTimer);

            countdownTimer = setInterval(() => {
                timeLeft--;
                if(timeLeft <= 0) {
                    clearInterval(countdownTimer);
                    resendBtn.classList.remove('disabled');
                    timerText.innerText = "";
                } else {
                    timerText.innerText = `(${timeLeft}s)`;
                }
            }, 1000);
        }

        function triggerResend() {
            if (!rawPhoneNumber) return;
            showNotification("Resending security OTP...", "fa-circle-notch fa-spin");

            auth.signInWithPhoneNumber(rawPhoneNumber, window.recaptchaVerifier)
                .then((result) => {
                    confirmationResult = result;
                    showNotification("New OTP Sent!", "fa-check-circle");
                    startResendTimer();
                })
                .catch((error) => {
                    showNotification("Error resending OTP. Please refresh.", "fa-times-circle");
                    resetRecaptchaInstance();
                });
        }
    </script>
</body>
</html>
