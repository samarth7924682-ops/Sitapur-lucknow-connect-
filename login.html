<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitapur Express | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0c1c3a; --gold: #ffc107; --white: #ffffff; --text-muted: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: var(--primary);
            background: linear-gradient(rgba(12, 28, 58, 0.95), rgba(12, 28, 58, 0.95)), url('https://images.unsplash.com/photo-1474487548417-781cb71495f3?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }
        
        .auth-card {
            background: var(--white); width: 100%; max-width: 360px;
            padding: 35px 25px; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
        }
        .auth-card h2 { font-size: 22px; font-weight: 800; color: var(--primary); margin-bottom: 6px; }
        .auth-card p { font-size: 12px; color: var(--text-muted); margin-bottom: 25px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 10px; font-weight: 800; color: var(--primary); margin-bottom: 6px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 15px; font-weight: 600; outline: none; color: var(--primary); }
        
        .auth-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 14px; font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .auth-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="auth-card">
        <div style="font-size: 38px; color: var(--gold); margin-bottom: 12px;"><i class="fas fa-train"></i></div>
        <h2>Sitapur Express</h2>
        <p>Client Verification Portal</p>

        <div class="input-group">
            <label>Mobile Number</label>
            <input type="tel" id="phoneNumber" placeholder="Enter 10-digit Number" maxlength="12">
        </div>
        <button class="auth-btn" id="loginBtn">LOGIN NOW</button>
    </div>

    <script>
        document.getElementById('loginBtn').addEventListener('click', () => {
            let phone = document.getElementById('phoneNumber').value.trim();
            
            // Check: 10 digit ya 91+10 digit
            if(phone.length >= 10) {
                // Number store karein
                localStorage.setItem("userPhone", phone);
                // Turant redirect
                window.location.href = "index.html";
            } else {
                alert("Please enter a valid mobile number.");
            }
        });
    </script>
</body>
</html>
