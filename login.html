<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitapur Express | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0c1c3a; --gold: #ffc107; --white: #ffffff; --text-muted: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--primary); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-card { background: var(--white); width: 100%; max-width: 360px; padding: 35px 25px; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; }
        .auth-card h2 { font-size: 22px; font-weight: 800; color: var(--primary); margin-bottom: 6px; }
        .auth-card p { font-size: 12px; color: var(--text-muted); margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 10px; font-weight: 800; color: var(--primary); margin-bottom: 6px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 15px; font-weight: 600; outline: none; color: var(--primary); transition: border 0.2s; }
        .input-group input:focus { border-color: var(--gold); }
        .auth-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 14px; font-size: 14px; font-weight: 800; cursor: pointer; transition: opacity 0.2s; margin-bottom: 10px; }
        .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .auth-btn:hover:not(:disabled) { opacity: 0.85; }
        .link-btn { background: none; border: none; color: var(--primary); font-size: 12px; font-weight: 700; cursor: pointer; text-decoration: underline; padding: 4px; }
        #otpSection { display: none; }
        .phone-display { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
        .phone-display strong { color: var(--primary); }
        .resend-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; font-size: 12px; }
        .msg { font-size: 12px; margin-top: 10px; padding: 8px 12px; border-radius: 8px; display: none; }
        .msg.success { background: #d1fae5; color: #065f46; display: block; }
        .msg.error { background: #fee2e2; color: #991b1b; display: block; }
        #timer { font-size: 12px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="auth-card">
        <div style="font-size: 38px; color: var(--gold); margin-bottom: 12px;"><i class="fas fa-train"></i></div>
        <h2>Sitapur Express</h2>
        <p id="subTitle">Client Verification Portal</p>

        <!-- Step 1: Phone Number -->
        <div id="phoneSection">
            <div class="input-group">
                <label>Mobile Number</label>
                <input type="tel" id="phoneNumber" placeholder="Enter 10-digit Number" maxlength="10">
            </div>
            <div id="phoneMsg" class="msg"></div>
            <button class="auth-btn" id="sendOtpBtn">SEND OTP</button>
        </div>

        <!-- Step 2: OTP Verify -->
        <div id="otpSection">
            <div class="phone-display">
                OTP SEND TO: <em id="phoneDisplay"></em>
                <br>
                <button class="link-btn" onclick="changeNumber()">CHANGE NUMBER</button>
            </div>
            <div class="input-group">
                <label>Enter OTP</label>
                <input type="number" id="otpInput" placeholder="Enter 6-digit OTP" maxlength="6">
            </div>
            <div id="otpMsg" class="msg"></div>
            <button class="auth-btn" id="verifyOtpBtn">VERIFY OTP</button>
            <div class="resend-row">
                <div id="timer"></div>
                <button class="link-btn" id="resendBtn" style="display:none;" onclick="resendOTP()">OTP Resend Karen</button>
            </div>
        </div>
    </div>

    <script>
        let generatedOTP = "";
        let userPhone = "";
        let timerInterval;
        let timerSeconds = 60;
        let otpShown = false;

        if (localStorage.getItem("user_logged_in") === "true") {
            window.location.href = "index.html";
        }

        function generateOTP() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        function startTimer() {
            timerSeconds = 60;
            document.getElementById("resendBtn").style.display = "none";
            document.getElementById("timer").innerText = `Resend in ${timerSeconds}s`;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerSeconds--;
                document.getElementById("timer").innerText = `Resend in ${timerSeconds}s`;
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById("timer").innerText = "";
                    document.getElementById("resendBtn").style.display = "inline";
                }
            }, 1000);
        }

        function showOTPSection() {
            if (otpShown) return;
            otpShown = true;
            document.getElementById("phoneSection").style.display = "none";
            document.getElementById("otpSection").style.display = "block";
            document.getElementById("subTitle").innerText = "OTP Verification";
            document.getElementById("phoneDisplay").innerText = "+91 " + userPhone;
            startTimer();
        }

        function changeNumber() {
            otpShown = false;
            clearInterval(timerInterval);
            document.getElementById("otpSection").style.display = "none";
            document.getElementById("phoneSection").style.display = "block";
            document.getElementById("subTitle").innerText = "Client Verification Portal";
            document.getElementById("otpInput").value = "";
            document.getElementById("otpMsg").className = "msg";
            document.getElementById("sendOtpBtn").disabled = false;
            document.getElementById("sendOtpBtn").innerText = "SEND OTP";
        }

        function sendOTPviaAPI(phone, otp) {
            otpShown = false;
            setTimeout(() => showOTPSection(), 3000);
            window.handleOTP = function(data) { showOTPSection(); };
            const script = document.createElement('script');
            script.src = `https://apitxt.com/api/sendOTP?authkey=7wx0YTb39xZuarBHYZvMt3wWTjKRHsqkSI-hzHgr1ZY&mobile=91${phone}&otp=${otp}&callback=handleOTP`;
            document.head.appendChild(script);
        }

        document.getElementById("sendOtpBtn").addEventListener("click", () => {
            const phone = document.getElementById("phoneNumber").value.trim();
            const msgEl = document.getElementById("phoneMsg");

            if (phone.length !== 10 || isNaN(phone)) {
                msgEl.className = "msg error";
                msgEl.innerText = "Please enter a valid 10-digit mobile number.";
                return;
            }

            userPhone = phone;
            generatedOTP = generateOTP();

            const btn = document.getElementById("sendOtpBtn");
            btn.disabled = true;
            btn.innerText = "Sending...";
            msgEl.className = "msg";
            msgEl.innerText = "";

            sendOTPviaAPI(phone, generatedOTP);
        });

        document.getElementById("verifyOtpBtn").addEventListener("click", () => {
            const enteredOTP = document.getElementById("otpInput").value.trim();
            const msgEl = document.getElementById("otpMsg");

            if (enteredOTP === generatedOTP) {
                clearInterval(timerInterval);
                msgEl.className = "msg success";
                msgEl.innerText = "OTP verified!";
                localStorage.setItem("user_phone", userPhone);
                localStorage.setItem("user_logged_in", "true");
                setTimeout(() => { window.location.href = "index.html"; }, 1000);
            } else {
                msgEl.className = "msg error";
                msgEl.innerText = "WRONG OTP! CHECK SMS AND TRY AGAIN";
            }
        });

        function resendOTP() {
            generatedOTP = generateOTP();
            otpShown = false;
            document.getElementById("resendBtn").style.display = "none";
            sendOTPviaAPI(userPhone, generatedOTP);
            const msgEl = document.getElementById("otpMsg");
            msgEl.className = "msg success";
            msgEl.innerText = "OTP resend ho gaya!";
        }

        document.getElementById("phoneNumber").addEventListener("keypress", (e) => {
            if (e.key === "Enter") document.getElementById("sendOtpBtn").click();
        });
        document.getElementById("otpInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") document.getElementById("verifyOtpBtn").click();
        });
    </script>
</body>
</html>
