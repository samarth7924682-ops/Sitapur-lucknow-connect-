<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }

        .fail-container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .icon-wrapper {
            position: relative;
            margin-bottom: 30px;
        }

        .fail-icon {
            width: 80px;
            height: 80px;
            background-color: #fff0f0; /* Light Red */
            color: #d93025;           /* Error Red */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto;
            border: 4px solid #fff;
            box-shadow: 0 10px 20px rgba(217, 48, 37, 0.15);
        }

        h1 {
            color: #1a1f36;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        p {
            color: #697386;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .btn {
            background-color: #d93025; /* Red Button */
            color: white;
            padding: 16px 40px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(217, 48, 37, 0.3);
            display: inline-block;
        }
        
        .btn:hover { background-color: #c5221f; }
        .redirect-text {
            font-size: 12px;
            color: #aaa;
            margin-top: 20px;
        }
        .progress-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 99px;
            margin-top: 10px;
            overflow: hidden;
            max-width: 400px;
            width: 90%;
            margin-left: auto;
            margin-right: auto;
        }
        .progress-fill {
            height: 100%;
            background: #d93025;
            border-radius: 99px;
            animation: fill 2s linear forwards;
        }
        @keyframes fill {
            from { width: 0%; }
            to { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="fail-container">
        <div class="icon-wrapper">
            <div class="fail-icon">✕</div>
        </div>
        <h1>Payment Failed</h1>
        <p>Your payment couldn't be processed. Please try again or use another payment method.</p>
        <a href="https://www.lkostpcouriers.in/booking.html" class="btn">Try Again</a>
        <p class="redirect-text">2 second mein automatically redirect ho raha hai...</p>
    </div>
    <div class="progress-bar"><div class="progress-fill"></div></div>

    <script>
        setTimeout(() => {
            window.location.replace("https://www.lkostpcouriers.in/index.html");
        }, 2000);
    </script>
</body>
</html>
